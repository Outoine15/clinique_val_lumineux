<!DOCTYPE html>
<html>
<head>
    <title>Secretariat - Val Lumineux</title>
</head>
<body>

    <h1>Gestion de la Clinique (Secretariat)</h1>

    <h3>Ajouter un nouveau creneau de consultation</h3>

    <form id="form-ajout-creneau" method="PUT"> 
    <label>Medecin</label>
    <select name="medecin_id" id="select-medecins" required>
        <option value="">Choisir un medecin</option>
    </select>
    <br>
    <label>Date et heure</label>
    <input type="datetime-local" name="date_heure" required>
    <br>
      <button type="submit">Ouvrir ce creneau</button>
    </form>

    <hr>


    

    <table>
    <thead>
        <tr>
            <th>Médecin</th>
            <th>Statut</th>
            <th>Date actuelle</th>
            <th>Décaler</th>
        </tr>
    </thead>
    <tbody id="table-corps-rdv">
        </tbody>
    </table>
    <script src="/scripts/homeSecret.js" type="module"></script>
  </body>

</html>
