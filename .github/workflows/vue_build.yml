name: Build & Release VueJS

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate release date
        run: echo "RELEASE_DATE=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_ENV

      - name: Zip dist folder
        run: |
          cd dist
          zip -r ../dist.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.RELEASE_DATE }}
          name: Build ${{ env.RELEASE_DATE }}
          files: dist.zip
