<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinique du Val Lumineux</title>
    <link rel="stylesheet" href="../styles/theme.css">
    <link rel="stylesheet" href="../styles/index_user.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </head>
  <body>
    <header-component>
    </header-component>

    <h1>Espace Client</h1>

    <section class="gestion-client">
      <h2>Gestion de vos comptes clients</h2>

      <section class="user-manage-client-info">
        <div class="client-info">
          <div>
            <b>Nom/Prénom</b>
            </div>
            <div>
              <b>Code Client</b>
            </div>
        </div>
      </section>

      <h2>Ajouter un client</h2>

      <h3>Client existant</h3>
      <input type="text" name="client-code" id="client-code" placeholder="Code Client...">
      <button type="button" id="client-code-confirm">Ajouter</button>
      <h3>Nouveau client</h3>
      <div id="user-client-info-input">
        <label for="new-client-firstname">Prénom</label>
        <input type="text" name="new-client-firstname" id="new-client-firstname" placeholder="Georges">
      </div>
      <div id="user-client-info-input">
        <label for="new-client-lastname">Nom de famille</label>
        <input type="text" name="new-client-lastname" id="new-client-lastname" placeholder="Dupont">
      </div>
      <div id="user-client-info-input">
        <label for="new-client-birthdate">Date de naissance</label>
        <input type="date" name="new-client-birthdate" id="new-client-birthdate">
      </div>
      <button type="button" id="new-client-confirm">Créer</button>

    </section>
    <div id="logout-button"></div>


    
    <script src="../scripts/index_user.js" type="module"></script>

    <footer-component>
    </footer-component>
  </body>
</html>
