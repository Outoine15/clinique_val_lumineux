<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <title>Clinique du Val Lumineux - Secrétaire</title>
  </head>
  <body>
    
    <header-component></header-component>

    <h1>Espace Secrétaire</h1>

    <section>
      <h2>Ajouter un nouveau creneau de consultation</h2>

      <form id="form-ajout-creneau" method="PUT"> 
      <label>Medecin</label>
      <select name="medecin_id" id="select-medecins" required>
          <option value="">Choisir un medecin</option>
      </select>
      <br>
      <label>Date et heure</label>
      <input type="datetime-local" name="date_heure" required>
      <label for="rdv_duration">durée du rendez-vous</label>
      <input id="rdv_duration" type="time" name="rdv_duration" required>

      <br>
        <button type="submit">Ouvrir ce créneau</button>
      </form>

      <hr>




      <table>
      <thead>
          <tr>
              <th>Médecin</th>
              <th>Statut</th>
              <th>Date actuelle</th>
              <th>Décaler</th>
          </tr>
      </thead>
      <tbody id="table-corps-rdv">
          </tbody>
      </table>
      <div id="logout-button"></div>
    </section>
    <footer-component></footer-component>

    <script src="../scripts/homeSecret.js" type="module"></script>
  </body>

</html>
