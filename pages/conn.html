<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/theme.css">
    <link rel="stylesheet" href="../styles/con_style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <title>Clinique du Val Lumineux - Connexion</title>
</head>
<body>
    <div class="conn" id="loginDiv">
        <div class="inline">
            <h1>Connexion</h1>
        </div>
        <div class="inline">
            <input type="text" name="mail" id="mail" placeholder="monmail@domaine.com">
        </div>
        <div class="inline">
            <input type="password" name="password" id="password" placeholder="Mot de passe">
            <i class="fa-regular fa-eye-slash" id="togglePassword"></i>
        </div>

        <div class="inline">
            <button id="connexion_bt">Se connecter</button>
        </div>
    </div>

    <script src="../scripts/conn.js" type="module"></script>
</body>
</html>
